<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coach Login - Angela Coach</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        .logo-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            border-radius: 24px 24px 0 0;
            text-align: center;
        }
        .btn-tp {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-tp:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-section">
            <i class="bi bi-lightning-charge-fill" style="font-size: 4rem;"></i>
            <h1 class="mb-2">Angela Coach</h1>
            <p class="mb-0 opacity-75">AI-Powered Training Assistant</p>
        </div>
        
        <div class="p-5">
            <h4 class="mb-4 text-center">Welcome Back, Coach!</h4>
            
            <div id="step1" class="mb-4">
                <p class="text-muted mb-3">
                    <i class="bi bi-info-circle me-2"></i>
                    Enter your TrainingPeaks coach email to continue
                </p>
                
                <div class="mb-3">
                    <label for="coachEmail" class="form-label fw-bold">Coach Email</label>
                    <input 
                        type="email" 
                        class="form-control form-control-lg" 
                        id="coachEmail" 
                        placeholder="coach@example.com"
                        required>
                    <small class="text-muted">Use the email from your TrainingPeaks coach account</small>
                </div>

                <div class="mb-3">
                    <label for="coachName" class="form-label fw-bold">Your Name</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg" 
                        id="coachName" 
                        placeholder="John Smith"
                        required>
                </div>
                
                <div class="d-grid">
                    <button class="btn btn-tp btn-lg" onclick="startOAuth()">
                        <i class="bi bi-key-fill me-2"></i>
                        Connect TrainingPeaks
                    </button>
                </div>
            </div>

            <div id="step2" style="display:none;">
                <div class="alert alert-info">
                    <div class="spinner-border spinner-border-sm me-2"></div>
                    Redirecting to TrainingPeaks...
                </div>
            </div>

            <div class="text-center mt-4">
                <p class="text-muted small mb-0">
                    <i class="bi bi-shield-check me-1"></i>
                    Your data is secure and never shared
                </p>
            </div>
        </div>
    </div>

    <script>
        function startOAuth() {
            const email = document.getElementById('coachEmail').value.trim();
            const name = document.getElementById('coachName').value.trim();
            
            if (!email || !name) {
                alert('Please enter both your email and name');
                return;
            }

            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address');
                return;
            }

            // Store coach info in sessionStorage
            sessionStorage.setItem('pending_coach_email', email);
            sessionStorage.setItem('pending_coach_name', name);

            // Show loading state
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';

            // Generate OAuth state with coach email embedded
            const state = 'coach_' + Date.now() + '_' + btoa(email);
            sessionStorage.setItem('tp_oauth_state', state);

            // Build OAuth URL
            const params = new URLSearchParams({
                client_id: 'qt2systems',
                response_type: 'code',
                redirect_uri: 'http://127.0.0.1:5000/handle_trainingpeaks_authorization',
                scope: 'coach:athletes coach:attach-athletes coach:create-athletes coach:detach-athletes coach:search-athletes events:read events:write coach:plans workouts:read workouts:details workouts:plan',
                state: state
            });

            const oauthURL = `https://oauth.trainingpeaks.com/OAuth/Authorize?${params.toString()}`;
            
            // Redirect to TrainingPeaks OAuth
            window.location.href = oauthURL;
        }

        // Check if there's a returning OAuth callback
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');

            if (error) {
                alert('OAuth error: ' + error);
                return;
            }

            if (code && state) {
                // Handle OAuth callback
                handleOAuthCallback(code, state);
            }
        });

        async function handleOAuthCallback(code, state) {
            const savedState = sessionStorage.getItem('tp_oauth_state');
            const coachEmail = sessionStorage.getItem('pending_coach_email');
            const coachName = sessionStorage.getItem('pending_coach_name');

            if (savedState !== state) {
                alert('Security error: State mismatch. Please try again.');
                return;
            }

            if (!coachEmail || !coachName) {
                alert('Session expired. Please login again.');
                window.location.href = '/static/coach-login';
                return;
            }

            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').innerHTML = `
                <div class="alert alert-info">
                    <div class="spinner-border spinner-border-sm me-2"></div>
                    Completing authentication...
                </div>
            `;
            document.getElementById('step2').style.display = 'block';

            try {
                const response = await fetch('/api/tp-callback-coach', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        code, 
                        coach_email: coachEmail,
                        coach_name: coachName
                    })
                });

                const data = await response.json();

                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Authentication failed');
                }

                // Clear pending data
                sessionStorage.removeItem('pending_coach_email');
                sessionStorage.removeItem('pending_coach_name');
                sessionStorage.removeItem('tp_oauth_state');

                // Success!
                document.getElementById('step2').innerHTML = `
                    <div class="alert alert-success">
                        <h5><i class="bi bi-check-circle-fill me-2"></i>Success!</h5>
                        <p class="mb-0">Welcome back, ${coachName}!</p>
                    </div>
                `;

                // Redirect to dashboard
                setTimeout(() => {
                    window.location.href = '/static/coach';
                }, 2000);

            } catch (error) {
                console.error('OAuth error:', error);
                document.getElementById('step2').innerHTML = `
                    <div class="alert alert-danger">
                        <h5><i class="bi bi-x-circle-fill me-2"></i>Error</h5>
                        <p class="mb-0">${error.message}</p>
                        <hr>
                        <button class="btn btn-danger btn-sm" onclick="location.href='/static/coach-login'">
                            Try Again
                        </button>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
